services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: langua
      POSTGRES_PASSWORD: langua
      POSTGRES_DB: langua
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
